<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Workout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4 mx-auto" style="max-width: 500px;">
    <h2 class="text-center text-success mb-4">Create Workout Plan</h2>
    <form th:action="@{/workout/save}" method="post">
        <div class="mb-3">
            <label class="form-label">Plan ID</label>
            <input type="text" name="planId" class="form-control" required placeholder="WP-001">
        </div>
        <div class="mb-3">
            <label class="form-label">Program Name</label>
            <input type="text" name="programName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Duration (Minutes)</label>
            <input type="number" name="duration" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Fitness Goal</label>
            <select name="goal" class="form-select">
                <option value="Fat Loss">Fat Loss</option>
                <option value="Muscle Gain">Muscle Gain</option>
                <option value="Endurance Training">Endurance Training</option>
            </select>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Save Plan</button>
            <a href="/workout/list" class="btn btn-light">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
