<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Workout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4 mx-auto" style="max-width: 500px;">
    <h2 class="text-center text-warning mb-4">Update Workout Plan</h2>
    <form th:action="@{/workout/update}" th:object="${plan}" method="post">
        <input type="hidden" th:field="*{planId}">
        <div class="mb-3">
            <label class="form-label">Program Name</label>
            <input type="text" th:field="*{programName}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Duration (Minutes)</label>
            <input type="number" th:field="*{durationMinutes}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Fitness Goal</label>
            <select th:field="*{fitnessGoal}" class="form-select">
                <option value="Fat Loss">Fat Loss</option>
                <option value="Muscle Gain">Muscle Gain</option>
                <option value="Endurance">Endurance</option>
            </select>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning text-white">Update Changes</button>
            <a href="/workout/list" class="btn btn-light">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
