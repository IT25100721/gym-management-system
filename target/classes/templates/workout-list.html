<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Workout Plans</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">Fitness Center - Workout Plans</h2>
    <a href="/workout/add" class="btn btn-success">Add New Workout Plan</a>
</div>

<table class="table table-striped table-bordered shadow">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Program Name</th>
        <th>Duration (Min)</th>
        <th>Fitness Goal</th>
        <th>Calories Burned</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="plan : ${plans}">
        <td th:text="${plan.planId}"></td>
        <td th:text="${plan.programName}"></td>
        <td th:text="${plan.durationMinutes}"></td>
        <td th:text="${plan.fitnessGoal}"></td>
        <!-- Polymorphism පාවිච්චි වන තැන -->
        <td th:text="${plan.calculateCaloriesBurned()}"></td>
        <td>
            <a th:href="@{/workout/edit(id=${plan.planId})}" class="btn btn-sm btn-warning">Edit</a>
            <a th:href="@{/workout/delete(id=${plan.planId})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
